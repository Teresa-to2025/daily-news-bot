name: Daily News to Feishu

on:
  schedule:
    - cron: '30 20 * * *'  # UTC 20:30 = 北京时间 8:30
  workflow_dispatch:  # 手动触发

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install requests akshare
          
      - name: Run news crawler
        run: python 每日新闻爬虫.py
